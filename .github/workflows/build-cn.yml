name: Build CN Umami

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '17 4 * * *'

permissions:
  contents: read
  packages: write

concurrency:
  group: build-cn-umami
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_REPO: https://github.com/umami-software/umami.git
      IMAGE_NAME: umami-cn

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Resolve latest upstream tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          tag=$(git ls-remote --tags --refs "$UPSTREAM_REPO" 'v*' \
            | awk -F/ '{print $3}' \
            | sort -V \
            | tail -n1)

          if [[ -z "$tag" ]]; then
            echo "Failed to determine upstream tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved upstream tag: $tag"

      - name: Clone upstream source
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth=1 --branch "${{ steps.version.outputs.tag }}" "$UPSTREAM_REPO" upstream

      - name: Apply CN display patch
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/apply_cn_patch.py upstream
          test -f upstream/src/lib/chinaFriendlyGeo.ts

      - name: Show patch diff
        shell: bash
        run: |
          set -euo pipefail
          cd upstream
          git diff -- src/components/hooks/useCountryNames.ts src/components/common/TypeIcon.tsx src/components/metrics/MetricLabel.tsx src/lib/chinaFriendlyGeo.ts

      - name: Prepare image owner
        id: prep
        shell: bash
        run: |
          set -euo pipefail
          owner_lc=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "owner_lc=$owner_lc" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./upstream
          file: ./upstream/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ steps.prep.outputs.owner_lc }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
            ghcr.io/${{ steps.prep.outputs.owner_lc }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build summary
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<SUMMARY
          ## Build complete

          Upstream tag: `${{ steps.version.outputs.tag }}`

          Published images:

          - `ghcr.io/${{ steps.prep.outputs.owner_lc }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}`
          - `ghcr.io/${{ steps.prep.outputs.owner_lc }}/${{ env.IMAGE_NAME }}:latest`
          SUMMARY
